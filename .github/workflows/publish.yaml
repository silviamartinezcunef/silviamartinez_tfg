name: Publish to GitHub Release

on:
  push:
    tags:
      - 'v*'  # Triggers the workflow on tags starting with 'v'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:

    # Step 1: Check out the code at the tag
    - name: Check out code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0  # Fetch all history for accurate git tags

    # Step 2: Set up Python environment
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'  # Specify your Python version

    # Step 3: Install build tools
    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build

    # Step 4: Build the package
    - name: Build package
      run: |
        python -m build  # Builds both sdist and wheel, output to 'dist/'

    # Step 5: Publish Release and upload artifacts
    
    - name: Publish Release
      uses: ncipollo/release-action@v1
      with:
        tag: ${{ github.ref_name }}  # The tag name, e.g., 'v0.5'
        name: Release ${{ github.ref_name }}  # Release title
        artifacts: 'dist/*'  # Upload all files in the 'dist' directory
        token: ${{ secrets.GITHUB_TOKEN }}
        allowUpdates: true  # Allows updating the release if it already exists
    